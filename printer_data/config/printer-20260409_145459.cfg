#[include menu.cfg]
#[include shaketune.cfg]
#[include accelerometer.cfg]
[include timelapse.cfg]
[include gcode_macro.cfg]
[include mainsail.cfg]

[auto_speed]

[neopixel my_neopixel]
pin: P1.23
chain_count: 3
color_order: GRB
initial_red: 1
initial_green: 1
initial_blue: 1

[temperature_sensor Host]
sensor_type: temperature_host
min_temp: 0
max_temp: 100

[mcu]
serial: /dev/ttyS1
restart_method: command

[stepper_x]
step_pin: P0.19
dir_pin: !P0.20
enable_pin: !P2.8
microsteps: 16
rotation_distance: 40
endstop_pin: P1.29
position_endstop: 0
position_min: 0
position_max: 234
homing_speed: 100

[stepper_y]
step_pin: P2.2
dir_pin: !P2.6
enable_pin: !P2.1
microsteps: 16
rotation_distance: 40
endstop_pin: P1.27
position_endstop: -15
position_min: -15
position_max: 240
homing_speed: 100

[stepper_z]
step_pin: P2.13
dir_pin: !P0.11
enable_pin: !P2.12
microsteps: 16
rotation_distance: 2
endstop_pin: probe:z_virtual_endstop
homing_speed: 100
position_min: -5
position_max: 295

[stepper_z1]
step_pin: P0.22
dir_pin: !P2.11
enable_pin: !P0.21
microsteps: 16
rotation_distance: 4

[tmc2208 stepper_x]
uart_pin: P1.15
run_current: 1.0
stealthchop_threshold: 0

[tmc2208 stepper_y]
uart_pin: P1.17
run_current: 1.0
stealthchop_threshold: 0

[tmc2208 stepper_z]
uart_pin: P1.8
run_current: 0.7
stealthchop_threshold: 9999

[tmc2208 stepper_z1]
uart_pin: P1.10
run_current: 0.7
stealthchop_threshold: 9999

[tmc2208 extruder]
uart_pin: P1.1
interpolate: true
run_current: 0.85
stealthchop_threshold: 0
driver_TBL: 0
driver_HEND: 6
driver_HSTRT: 7
driver_TOFF: 4

[extruder]
max_extrude_only_distance: 500
max_extrude_only_velocity: 120
step_pin: P0.1
dir_pin: P0.0
enable_pin: !P0.10
microsteps: 16
rotation_distance: 4.637
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: P2.7
sensor_type: EPCOS 100K B57560G104F
sensor_pin: P0.24
#control: pid
#pid_Kp: 21.527
#pid_Ki: 1.063
#pid_Kd: 108.982
min_temp: 0
max_temp: 260
#pressure_advance: 0.023
pressure_advance: 0.069

[heater_fan hotend_fan]
pin: P2.4
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 50.0

[fan]
pin: P2.3

[heater_bed]
heater_pin: P2.5
sensor_type: EPCOS 100K B57560G104F
sensor_pin: P0.23
control: pid
pid_Kp: 54.027
pid_Ki: 0.770
pid_Kd: 948.182
min_temp: 0
max_temp: 130

[bltouch]
sensor_pin: P1.25
control_pin: P2.0
x_offset: 0
y_offset: 32
#z_offset: 2.7
speed: 5
lift_speed: 30

[bed_mesh]
speed: 200
mesh_min: 1, 17
mesh_max: 232, 230
algorithm: bicubic
probe_count: 5, 5
fade_start: 1
fade_end: 10
fade_target: 0
horizontal_move_z: 10

[z_tilt]
z_positions:
  -57, 116
  277, 116
points:
  0, 83
  234, 83
retries: 50
retry_tolerance: 0.0050
speed: 200
horizontal_move_z: 10

[screws_tilt_adjust]
screw1: 31, 0
screw1_name: front left screw
screw2: 202, 0
screw2_name: front right screw
screw3: 202, 168
screw3_name: rear right screw
screw4: 31, 168
screw4_name: rear left screw
horizontal_move_z: 10.
speed: 50.
screw_thread: CW-M4

[homing_override]
axes: xyz
set_position_x: 0
set_position_y: 0
set_position_z: 0
gcode:
  G91
  G1 Z10 F6000
  G90
  G28 Y
  G28 X
  G1 X117 Y115 F12000
  G28 Z
  G1 Z10 F6000

[idle_timeout]
gcode:
  M84
  
[printer]
kinematics: corexy
max_velocity: 300
max_accel: 10000
max_z_velocity: 5
max_z_accel: 100

[virtual_sdcard]
path: /home/zerog/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[exclude_object]

[delayed_gcode bed_mesh_init]
initial_duration: .01
gcode:
  BED_MESH_PROFILE LOAD=default
  
